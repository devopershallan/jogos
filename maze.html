<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>Maze Chomp | Jogos</title><link rel="stylesheet" href="game.css"></head><body class="maze-page"><main class="page"><div class="topbar"><a href="index.html">← Menu</a><h1>Maze</h1></div><section class="panel"><div class="game-wrap"><canvas id="game" width="420" height="620"></canvas><div class="hud"><span id="score">Pontos: 0</span><span id="left">Pílulas: 0</span></div><div class="controls grid3"><span class="spacer"></span><button class="btn" data-dir="up">↑</button><span class="spacer"></span><button class="btn" data-dir="left">←</button><button class="btn primary" id="pause">Pausar</button><button class="btn" data-dir="right">→</button><span class="spacer"></span><button class="btn" data-dir="down">↓</button><span class="spacer"></span></div><p class="help">Mobile: deslize ou use o direcional. Colete tudo e evite os fantasmas.</p></div></section></main><script>
const c=document.getElementById('game'),ctx=c.getContext('2d'),scoreEl=document.getElementById('score'),leftEl=document.getElementById('left'),pauseBtn=document.getElementById('pause'),S=20,OX=10,OY=90;const MAP=["####################","#........#.........#","#.####.#.#.###.###.#","#......#...#.......#","#.##.#####.#.#####.#","#.#...............#.#","#.#.###.#####.###.#.#","#...#.....#.....#...#","###.#.###.#.###.#.###","#.....#.......#.....#","#.###.#.#####.#.###.#","#...#...........#...#","###.#.###.#.###.#.###","#...#.....#.....#...#","#.#.###.#####.###.#.#","#.#...............#.#","#.##.#####.#.#####.#","#......#...#.......#","#.####.#.#.###.###.#","#........#.........#","####################"];const R=MAP.length,C=MAP[0].length;let dots,player,ghosts,dir,next,score,run=false,over=false,msg='Toque para começar',last=0,sx,sy;function init(){dots=new Set();for(let y=0;y<R;y++)for(let x=0;x<C;x++)if(MAP[y][x]==='.')dots.add(x+','+y);player={x:1,y:1,px:1,py:1};ghosts=[{x:18,y:1,c:'#fb7185'},{x:1,y:19,c:'#a78bfa'},{x:18,y:19,c:'#fbbf24'}];dir={x:1,y:0};next=dir;score=0;run=true;over=false;upd()}function upd(){scoreEl.textContent='Pontos: '+score;leftEl.textContent='Pílulas: '+dots.size}function wall(x,y){return MAP[y]?.[x]==='#'}function setDir(d){let m={up:{x:0,y:-1},down:{x:0,y:1},left:{x:-1,y:0},right:{x:1,y:0}}[d];next=m;if(!run){init();return}}function draw(){ctx.fillStyle='#020617';ctx.fillRect(0,0,c.width,c.height);for(let y=0;y<R;y++)for(let x=0;x<C;x++){if(MAP[y][x]==='#'){ctx.fillStyle='#1d4ed8';ctx.beginPath();ctx.roundRect(OX+x*S,OY+y*S,S-1,S-1,4);ctx.fill()}}ctx.fillStyle='#f8fafc';dots.forEach(k=>{let [x,y]=k.split(',').map(Number);ctx.beginPath();ctx.arc(OX+x*S+S/2,OY+y*S+S/2,3,0,7);ctx.fill()});ctx.fillStyle='#facc15';ctx.beginPath();ctx.arc(OX+player.x*S+S/2,OY+player.y*S+S/2,8,0.25,Math.PI*1.75);ctx.lineTo(OX+player.x*S+S/2,OY+player.y*S+S/2);ctx.fill();ghosts.forEach(g=>{ctx.fillStyle=g.c;ctx.beginPath();ctx.arc(OX+g.x*S+S/2,OY+g.y*S+S/2,8,Math.PI,0);ctx.lineTo(OX+g.x*S+S-2,OY+g.y*S+S-2);ctx.lineTo(OX+g.x*S+2,OY+g.y*S+S-2);ctx.closePath();ctx.fill()});if(!run||over){ctx.fillStyle='rgba(2,6,23,.72)';ctx.fillRect(0,0,c.width,c.height);ctx.fillStyle='#fff';ctx.font='800 22px system-ui';ctx.textAlign='center';ctx.fillText(msg,c.width/2,c.height/2)}}function moveActor(a,d){let nx=a.x+d.x,ny=a.y+d.y;if(!wall(nx,ny)){a.x=nx;a.y=ny;return true}return false}function ghostMove(g){let opts=[{x:1,y:0},{x:-1,y:0},{x:0,y:1},{x:0,y:-1}].filter(d=>!wall(g.x+d.x,g.y+d.y));opts.sort((a,b)=>(Math.abs(g.x+a.x-player.x)+Math.abs(g.y+a.y-player.y))-(Math.abs(g.x+b.x-player.x)+Math.abs(g.y+b.y-player.y)));let pick=Math.random()<.72?opts[0]:opts[Math.floor(Math.random()*opts.length)];moveActor(g,pick)}function loop(t){if(run&&!over&&t-last>145){last=t;if(!wall(player.x+next.x,player.y+next.y))dir=next;moveActor(player,dir);let k=player.x+','+player.y;if(dots.has(k)){dots.delete(k);score+=10;upd()}ghosts.forEach(ghostMove);if(ghosts.some(g=>g.x===player.x&&g.y===player.y)){run=false;over=true;msg='Fantasma pegou! Toque para reiniciar'}if(dots.size===0){run=false;over=true;msg='Você limpou o labirinto!'}}draw();requestAnimationFrame(loop)}c.onpointerdown=e=>{if(over||!run)init();sx=e.clientX;sy=e.clientY};c.onpointerup=e=>{let dx=e.clientX-sx,dy=e.clientY-sy;if(Math.max(Math.abs(dx),Math.abs(dy))>18)setDir(Math.abs(dx)>Math.abs(dy)?(dx>0?'right':'left'):(dy>0?'down':'up'))};document.querySelectorAll('[data-dir]').forEach(b=>b.onclick=()=>setDir(b.dataset.dir));pauseBtn.onclick=()=>{if(!run&&!over)init();else{run=!run;msg='Pausado'}};document.onkeydown=e=>({ArrowUp:'up',w:'up',ArrowDown:'down',s:'down',ArrowLeft:'left',a:'left',ArrowRight:'right',d:'right'}[e.key]&&setDir({ArrowUp:'up',w:'up',ArrowDown:'down',s:'down',ArrowLeft:'left',a:'left',ArrowRight:'right',d:'right'}[e.key]));init();run=false;requestAnimationFrame(loop);
</script></body></html>
