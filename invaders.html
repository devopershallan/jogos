<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>Space Invaders | Jogos</title><link rel="stylesheet" href="game.css"></head><body><main class="page"><div class="topbar"><a href="index.html">← Menu</a><h1>Invaders</h1></div><section class="panel"><div class="game-wrap"><canvas id="game" width="420" height="640"></canvas><div class="hud"><span id="score">Pontos: 0</span><span id="lives">Vidas: 3</span></div><div class="controls row"><button class="btn" data-hold="left">←</button><button class="btn primary" id="fire">Atirar</button><button class="btn" data-hold="right">→</button></div><p class="help">Mobile: segure para mover e toque em Atirar. Destrua os invasores antes que desçam.</p></div></section></main><script>
const c=document.getElementById('game'),ctx=c.getContext('2d'),W=c.width,H=c.height;let ship,aliens,shots,enemyShots,dir,score,lives,run=false,over=false,hold=null,msg='Toque para começar',cool=0,tick=0;function init(){ship={x:W/2,y:H-55,w:36,h:24};shots=[];enemyShots=[];aliens=[];for(let r=0;r<5;r++)for(let col=0;col<7;col++)aliens.push({x:40+col*48,y:80+r*34,w:28,h:20,on:true});dir=1;score=0;lives=3;run=true;over=false;upd()}function upd(){scoreEl.textContent='Pontos: '+score;livesEl.textContent='Vidas: '+lives}function draw(){ctx.fillStyle='#020617';ctx.fillRect(0,0,W,H);ctx.fillStyle='#22d3ee';ctx.beginPath();ctx.moveTo(ship.x,ship.y-18);ctx.lineTo(ship.x-22,ship.y+18);ctx.lineTo(ship.x+22,ship.y+18);ctx.closePath();ctx.fill();ctx.fillStyle='#a78bfa';aliens.forEach(a=>{if(a.on){ctx.beginPath();ctx.roundRect(a.x,a.y,a.w,a.h,6);ctx.fill();ctx.fillRect(a.x+5,a.y-5,5,5);ctx.fillRect(a.x+a.w-10,a.y-5,5,5)}});ctx.fillStyle='#34d399';shots.forEach(s=>ctx.fillRect(s.x-2,s.y,4,12));ctx.fillStyle='#fb7185';enemyShots.forEach(s=>ctx.fillRect(s.x-2,s.y,4,12));if(!run||over){ctx.fillStyle='rgba(2,6,23,.7)';ctx.fillRect(0,0,W,H);ctx.fillStyle='#fff';ctx.font='800 23px system-ui';ctx.textAlign='center';ctx.fillText(msg,W/2,H/2)}}function shoot(){if(!run){init();return}if(cool<=0){shots.push({x:ship.x,y:ship.y-25});cool=22}}function step(){if(run&&!over){tick++;cool--;if(hold==='left')ship.x-=5.6;if(hold==='right')ship.x+=5.6;ship.x=Math.max(26,Math.min(W-26,ship.x));let live=aliens.filter(a=>a.on);let edge=live.some(a=>(dir>0&&a.x+a.w>W-20)||(dir<0&&a.x<20));if(edge){dir*=-1;live.forEach(a=>a.y+=18)}live.forEach(a=>a.x+=dir*(1.1+score/500));if(tick%55===0&&live.length){let a=live[Math.floor(Math.random()*live.length)];enemyShots.push({x:a.x+a.w/2,y:a.y+a.h})}shots.forEach(s=>s.y-=7);enemyShots.forEach(s=>s.y+=4.2);shots=shots.filter(s=>s.y>-20);enemyShots=enemyShots.filter(s=>s.y<H+20);for(const s of shots)for(const a of live){if(a.on&&s.x>a.x&&s.x<a.x+a.w&&s.y>a.y&&s.y<a.y+a.h){a.on=false;s.y=-99;score+=10;upd();break}}for(const s of enemyShots){if(Math.abs(s.x-ship.x)<24&&Math.abs(s.y-ship.y)<22){s.y=999;lives--;upd();if(lives<=0){over=true;run=false;msg='Fim de jogo. Toque para reiniciar'}}}if(live.some(a=>a.y+a.h>ship.y-25)){over=true;run=false;msg='Invasão completa. Tente de novo'}if(live.every(a=>!a.on)){over=true;run=false;msg='Você salvou a galáxia!'}}draw();requestAnimationFrame(step)}function start(){if(over||!aliens)init();else run=true}c.onpointerdown=start;document.querySelectorAll('[data-hold]').forEach(b=>{b.onpointerdown=()=>{start();hold=b.dataset.hold};b.onpointerup=b.onpointercancel=()=>hold=null});fire.onclick=()=>{start();shoot()};document.onkeydown=e=>{if(e.key==='ArrowLeft')hold='left';if(e.key==='ArrowRight')hold='right';if(e.code==='Space')shoot()};document.onkeyup=e=>{if(e.key.includes('Arrow'))hold=null};init();run=false;requestAnimationFrame(step);
</script></body></html>
