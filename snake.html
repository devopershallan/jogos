<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>Snake | Jogos</title><link rel="stylesheet" href="game.css"></head><body><main class="page"><div class="topbar"><a href="index.html">← Menu</a><h1>Snake</h1></div><section class="panel"><div class="game-wrap"><canvas id="game" width="420" height="620"></canvas><div class="hud"><span id="score">Pontos: 0</span><span id="best">Recorde: 0</span></div><div class="controls grid3"><span class="spacer"></span><button class="btn" data-dir="up">↑</button><span class="spacer"></span><button class="btn" data-dir="left">←</button><button class="btn primary" id="pause">Pausar</button><button class="btn" data-dir="right">→</button><span class="spacer"></span><button class="btn" data-dir="down">↓</button><span class="spacer"></span></div><p class="help">Mobile: deslize na tela ou use o direcional. Coma os pontos e não bata no próprio corpo.</p></div></section></main><script>
const c=document.getElementById('game'),ctx=c.getContext('2d'),scoreEl=document.getElementById('score'),bestEl=document.getElementById('best'),pauseBtn=document.getElementById('pause'),N=21,S=c.width/N,boardTop=100;let snake,dir,next,food,score,best=+localStorage.snakeBest||0,run=false,over=false,last=0,delay=125,msg='Toque para começar';bestEl.textContent='Recorde: '+best;function init(){snake=[{x:10,y:14},{x:10,y:15},{x:10,y:16}];dir={x:0,y:-1};next=dir;score=0;place();over=false;run=true;msg=''}function place(){do{food={x:Math.floor(Math.random()*N),y:Math.floor(Math.random()*N)}}while(snake?.some(p=>p.x==food.x&&p.y==food.y))}function draw(){ctx.fillStyle='#020617';ctx.fillRect(0,0,c.width,c.height);ctx.fillStyle='#94a3b8';ctx.font='700 18px system-ui';ctx.textAlign='center';ctx.fillText('SNAKE',c.width/2,36);ctx.strokeStyle='rgba(148,163,184,.12)';for(let i=0;i<=N;i++){ctx.beginPath();ctx.moveTo(i*S,boardTop);ctx.lineTo(i*S,boardTop+N*S);ctx.stroke();ctx.beginPath();ctx.moveTo(0,boardTop+i*S);ctx.lineTo(c.width,boardTop+i*S);ctx.stroke()}ctx.fillStyle='#fb7185';cell(food.x,food.y,7);snake.forEach((p,i)=>{ctx.fillStyle=i?'#22d3ee':'#34d399';cell(p.x,p.y,6)});if(!run||over){ctx.fillStyle='rgba(2,6,23,.72)';ctx.fillRect(0,0,c.width,c.height);ctx.fillStyle='#fff';ctx.font='800 24px system-ui';ctx.fillText(msg,c.width/2,c.height/2)}}function cell(x,y,r){ctx.beginPath();ctx.roundRect(x*S+2,boardTop+y*S+2,S-4,S-4,r);ctx.fill()}function step(t){if(run&&!over&&t-last>delay){last=t;dir=next;let h={x:snake[0].x+dir.x,y:snake[0].y+dir.y};if(h.x<0||h.y<0||h.x>=N||h.y>=N||snake.some(p=>p.x==h.x&&p.y==h.y)){over=true;run=false;msg='Fim de jogo. Toque para reiniciar'}snake.unshift(h);if(h.x==food.x&&h.y==food.y){score++;scoreEl.textContent='Pontos: '+score;if(score>best){best=score;localStorage.snakeBest=best;bestEl.textContent='Recorde: '+best}place()}else snake.pop()}draw();requestAnimationFrame(step)}function setDir(d){if(!run){init();return}let m={up:{x:0,y:-1},down:{x:0,y:1},left:{x:-1,y:0},right:{x:1,y:0}}[d];if(m.x!=-dir.x||m.y!=-dir.y)next=m}let sx,sy;c.onpointerdown=e=>{if(over||!run)init();sx=e.clientX;sy=e.clientY};c.onpointerup=e=>{let dx=e.clientX-sx,dy=e.clientY-sy;if(Math.max(Math.abs(dx),Math.abs(dy))>20)setDir(Math.abs(dx)>Math.abs(dy)?(dx>0?'right':'left'):(dy>0?'down':'up'))};document.querySelectorAll('[data-dir]').forEach(b=>b.onclick=()=>setDir(b.dataset.dir));pauseBtn.onclick=()=>{if(!run&&!over)init();else{run=!run;msg='Pausado'}};document.onkeydown=e=>({ArrowUp:'up',w:'up',ArrowDown:'down',s:'down',ArrowLeft:'left',a:'left',ArrowRight:'right',d:'right'}[e.key]&&setDir({ArrowUp:'up',w:'up',ArrowDown:'down',s:'down',ArrowLeft:'left',a:'left',ArrowRight:'right',d:'right'}[e.key]));init();run=false;requestAnimationFrame(step);
</script></body></html>
