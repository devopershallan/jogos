<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>Breakout | Jogos</title><link rel="stylesheet" href="game.css"></head><body><main class="page"><div class="topbar"><a href="index.html">← Menu</a><h1>Breakout</h1></div><section class="panel"><div class="game-wrap"><canvas id="game" width="420" height="640"></canvas><div class="hud"><span id="score">Pontos: 0</span><span id="lives">Vidas: 3</span></div><div class="controls row"><button class="btn" data-hold="left">←</button><button class="btn primary" id="pause">Pausar</button><button class="btn" data-hold="right">→</button></div><p class="help">Mobile: arraste a raquete ou segure os botões. Quebre todos os blocos.</p></div></section></main><script>
const c=document.getElementById('game'),ctx=c.getContext('2d'),W=c.width,H=c.height;let paddle={x:W/2-55,y:H-54,w:110,h:14},ball,bricks,score,lives,run=false,over=false,msg='Toque para começar',hold=null;function init(){score=0;lives=3;ball={x:W/2,y:H-90,r:8,vx:3.6,vy:-4.8};bricks=[];for(let r=0;r<6;r++)for(let col=0;col<7;col++)bricks.push({x:18+col*55,y:78+r*28,w:45,h:18,on:true,c:r});run=true;over=false;upd()}function upd(){scoreEl.textContent='Pontos: '+score;livesEl.textContent='Vidas: '+lives}function draw(){ctx.fillStyle='#020617';ctx.fillRect(0,0,W,H);bricks.forEach(b=>{if(!b.on)return;ctx.fillStyle=['#22d3ee','#a78bfa','#34d399','#fbbf24','#fb7185','#60a5fa'][b.c];ctx.beginPath();ctx.roundRect(b.x,b.y,b.w,b.h,6);ctx.fill()});ctx.fillStyle='#e5e7eb';ctx.beginPath();ctx.roundRect(paddle.x,paddle.y,paddle.w,paddle.h,8);ctx.fill();ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(ball.x,ball.y,ball.r,0,7);ctx.fill();if(!run||over){ctx.fillStyle='rgba(2,6,23,.7)';ctx.fillRect(0,0,W,H);ctx.fillStyle='#fff';ctx.font='800 24px system-ui';ctx.textAlign='center';ctx.fillText(msg,W/2,H/2)}}function step(){if(run&&!over){if(hold==='left')paddle.x-=7;if(hold==='right')paddle.x+=7;paddle.x=Math.max(8,Math.min(W-paddle.w-8,paddle.x));ball.x+=ball.vx;ball.y+=ball.vy;if(ball.x<ball.r||ball.x>W-ball.r)ball.vx*=-1;if(ball.y<ball.r)ball.vy*=-1;if(ball.x>paddle.x&&ball.x<paddle.x+paddle.w&&ball.y+ball.r>paddle.y&&ball.y-ball.r<paddle.y+paddle.h&&ball.vy>0){ball.vy=-Math.abs(ball.vy)*1.02;ball.vx+=(ball.x-(paddle.x+paddle.w/2))*0.055}for(const b of bricks){if(b.on&&ball.x+ball.r>b.x&&ball.x-ball.r<b.x+b.w&&ball.y+ball.r>b.y&&ball.y-ball.r<b.y+b.h){b.on=false;score+=10;ball.vy*=-1;upd();break}}if(ball.y>H+10){lives--;upd();if(lives<=0){run=false;over=true;msg='Fim de jogo. Toque para reiniciar'}else{ball={x:W/2,y:H-90,r:8,vx:3.6*(Math.random()>.5?1:-1),vy:-4.8}}}if(bricks.every(b=>!b.on)){run=false;over=true;msg='Você venceu! Toque para jogar de novo'}}draw();requestAnimationFrame(step)}function start(){if(over||!bricks)init();run=true;msg='Pausado'}c.onpointerdown=e=>{start();move(e)};c.onpointermove=move;function move(e){let r=c.getBoundingClientRect();paddle.x=(e.clientX-r.left)/r.width*W-paddle.w/2}document.querySelectorAll('[data-hold]').forEach(b=>{b.onpointerdown=()=>{start();hold=b.dataset.hold};b.onpointerup=b.onpointercancel=()=>hold=null});pause.onclick=()=>{if(!run&&!over)start();else{run=!run;msg='Pausado'}};document.onkeydown=e=>{if(e.key==='ArrowLeft')hold='left';if(e.key==='ArrowRight')hold='right';if(e.code==='Space')pause.click()};document.onkeyup=()=>hold=null;init();run=false;requestAnimationFrame(step);
</script></body></html>
