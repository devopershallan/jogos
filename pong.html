<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>Pong Mobile | Jogos</title><link rel="stylesheet" href="game.css"></head><body><main class="page"><div class="topbar"><a href="index.html">← Menu</a><h1>Pong</h1></div><section class="panel game-layout"><div class="game-wrap"><canvas id="game" width="420" height="720" aria-label="Pong vertical mobile"></canvas><div class="hud"><span id="score">Você 0 × 0 CPU</span><span>Primeiro a 7 vence</span></div><p class="help">Mobile: arraste a raquete de baixo ou use os botões. Teclado: ← →, Espaço pausa.</p></div><div class="controls row"><button class="btn" data-hold="left">←</button><button class="btn primary" id="pause">Pausar</button><button class="btn" data-hold="right">→</button></div></section></main><script>
const c=document.getElementById('game'),x=c.getContext('2d'),scoreEl=document.getElementById('score');const W=c.width,H=c.height;let keys={},hold=null,started=false,paused=false,over=false,msg='Toque para começar';const player={x:W/2-48,y:H-48,w:96,h:14,score:0},cpu={x:W/2-48,y:34,w:96,h:14,score:0},ball={x:W/2,y:H/2,r:9,vx:4.2,vy:5};function reset(dir=1){ball.x=W/2;ball.y=H/2;ball.vx=(Math.random()>.5?1:-1)*3.8;ball.vy=dir*5}function draw(){x.clearRect(0,0,W,H);let g=x.createLinearGradient(0,0,W,H);g.addColorStop(0,'#071226');g.addColorStop(1,'#111827');x.fillStyle=g;x.fillRect(0,0,W,H);x.strokeStyle='rgba(148,163,184,.22)';x.setLineDash([10,12]);x.beginPath();x.moveTo(18,H/2);x.lineTo(W-18,H/2);x.stroke();x.setLineDash([]);[player,cpu].forEach((p,i)=>{x.fillStyle=i?'#a78bfa':'#22d3ee';round(p.x,p.y,p.w,p.h,7)});x.fillStyle='#fff';x.beginPath();x.arc(ball.x,ball.y,ball.r,0,7);x.fill();x.fillStyle='rgba(255,255,255,.92)';x.font='700 42px system-ui';x.textAlign='center';x.fillText(cpu.score,W/2,H/2-34);x.fillText(player.score,W/2,H/2+66);if(!started||paused||over){x.fillStyle='rgba(2,6,23,.68)';x.fillRect(0,0,W,H);x.fillStyle='#e5e7eb';x.font='800 26px system-ui';x.fillText(msg,W/2,H/2)}}function round(a,b,w,h,r){x.beginPath();x.roundRect(a,b,w,h,r);x.fill()}function hit(p){return ball.x+ball.r>p.x&&ball.x-ball.r<p.x+p.w&&ball.y+ball.r>p.y&&ball.y-ball.r<p.y+p.h}function step(){if(started&&!paused&&!over){let sp=7;if(keys.ArrowLeft||hold==='left')player.x-=sp;if(keys.ArrowRight||hold==='right')player.x+=sp;player.x=Math.max(8,Math.min(W-player.w-8,player.x));cpu.x+=(ball.x-(cpu.x+cpu.w/2))*0.075;cpu.x=Math.max(8,Math.min(W-cpu.w-8,cpu.x));ball.x+=ball.vx;ball.y+=ball.vy;if(ball.x<ball.r||ball.x>W-ball.r)ball.vx*=-1;if(hit(player)&&ball.vy>0){ball.vy=-Math.abs(ball.vy)*1.045;ball.vx+=(ball.x-(player.x+player.w/2))*0.08}if(hit(cpu)&&ball.vy<0){ball.vy=Math.abs(ball.vy)*1.035;ball.vx+=(ball.x-(cpu.x+cpu.w/2))*0.06}if(ball.y>H+20){cpu.score++;reset(-1)}if(ball.y<-20){player.score++;reset(1)}scoreEl.textContent=`Você ${player.score} × ${cpu.score} CPU`;if(player.score>=7||cpu.score>=7){over=true;msg=player.score>cpu.score?'Você venceu! Toque para reiniciar':'CPU venceu. Toque para tentar de novo'}}draw();requestAnimationFrame(step)}function start(){if(over){player.score=cpu.score=0;over=false;scoreEl.textContent='Você 0 × 0 CPU';reset(1)}started=true;paused=false;msg='Pausado'}c.addEventListener('pointerdown',e=>{start();move(e)});c.addEventListener('pointermove',move);function move(e){if(e.pointerType){let r=c.getBoundingClientRect();player.x=(e.clientX-r.left)/r.width*W-player.w/2}}document.onkeydown=e=>{keys[e.key]=1;if(e.code==='Space'){started?paused=!paused:start();msg='Pausado'}};document.onkeyup=e=>keys[e.key]=0;document.querySelectorAll('[data-hold]').forEach(b=>{b.onpointerdown=()=>{start();hold=b.dataset.hold};b.onpointerup=b.onpointercancel=()=>hold=null});document.getElementById('pause').onclick=()=>{started?paused=!paused:start();msg='Pausado'};reset(1);step();
</script></body></html>
