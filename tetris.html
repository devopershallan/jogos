<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>Tetris | Jogos</title><link rel="stylesheet" href="game.css"></head><body class="tetris-page"><main class="page"><div class="topbar"><a href="index.html">← Menu</a><h1>Tetris</h1></div><section class="panel"><div class="game-wrap"><canvas id="game" width="360" height="660"></canvas><div class="hud"><span id="score">Pontos: 0</span><span id="lines">Linhas: 0</span></div><div class="controls row"><button class="btn" id="left">←</button><button class="btn primary" id="rot">Girar</button><button class="btn" id="right">→</button><button class="btn" id="down">↓</button><button class="btn" id="drop">Cair</button><button class="btn" id="pause">Pausar</button></div><p class="help">Mobile: botões grandes. Complete linhas para pontuar.</p></div></section></main><script>
const c=document.getElementById('game'),ctx=c.getContext('2d'),scoreEl=document.getElementById('score'),linesEl=document.getElementById('lines'),leftBtn=document.getElementById('left'),rightBtn=document.getElementById('right'),downBtn=document.getElementById('down'),dropBtn=document.getElementById('drop'),rotBtn=document.getElementById('rot'),pauseBtn=document.getElementById('pause'),COL=10,ROW=20,S=30,OX=30,OY=36;const SH={I:[[1,1,1,1]],O:[[1,1],[1,1]],T:[[0,1,0],[1,1,1]],S:[[0,1,1],[1,1,0]],Z:[[1,1,0],[0,1,1]],J:[[1,0,0],[1,1,1]],L:[[0,0,1],[1,1,1]]},CS=['#22d3ee','#fbbf24','#a78bfa','#34d399','#fb7185','#60a5fa','#f97316'];let board,piece,score=0,lines=0,run=false,over=false,last=0,msg='Toque para começar';function init(){board=Array.from({length:ROW},()=>Array(COL).fill(0));score=lines=0;newPiece();run=true;over=false;upd()}function upd(){scoreEl.textContent='Pontos: '+score;linesEl.textContent='Linhas: '+lines}function newPiece(){let ks=Object.keys(SH),i=Math.floor(Math.random()*ks.length),k=ks[i];piece={m:SH[k].map(r=>[...r]),x:3,y:0,c:CS[i]};if(coll(piece.x,piece.y,piece.m)){over=true;run=false;msg='Fim de jogo. Toque para reiniciar'}}function coll(px,py,m){for(let y=0;y<m.length;y++)for(let x=0;x<m[y].length;x++)if(m[y][x]){let nx=px+x,ny=py+y;if(nx<0||nx>=COL||ny>=ROW||board[ny]?.[nx])return true}return false}function merge(){piece.m.forEach((r,y)=>r.forEach((v,x)=>{if(v&&piece.y+y>=0)board[piece.y+y][piece.x+x]=piece.c}));let cleared=0;board=board.filter(r=>{if(r.every(Boolean)){cleared++;return false}return true});while(board.length<ROW)board.unshift(Array(COL).fill(0));if(cleared){lines+=cleared;score+=cleared*100*cleared;upd()}newPiece()}function move(dx){if(!run)return start();if(!coll(piece.x+dx,piece.y,piece.m))piece.x+=dx}function soft(){if(!run)return start();if(!coll(piece.x,piece.y+1,piece.m))piece.y++;else merge()}function hard(){if(!run)return start();while(!coll(piece.x,piece.y+1,piece.m))piece.y++;merge()}function rotate(){if(!run)return start();let m=piece.m[0].map((_,i)=>piece.m.map(r=>r[i]).reverse());if(!coll(piece.x,piece.y,m))piece.m=m}function drawCell(x,y,col){ctx.fillStyle=col;ctx.beginPath();ctx.roundRect(OX+x*S+1,OY+y*S+1,S-2,S-2,5);ctx.fill()}function draw(){ctx.fillStyle='#020617';ctx.fillRect(0,0,c.width,c.height);ctx.strokeStyle='rgba(148,163,184,.13)';for(let x=0;x<=COL;x++){ctx.beginPath();ctx.moveTo(OX+x*S,OY);ctx.lineTo(OX+x*S,OY+ROW*S);ctx.stroke()}for(let y=0;y<=ROW;y++){ctx.beginPath();ctx.moveTo(OX,OY+y*S);ctx.lineTo(OX+COL*S,OY+y*S);ctx.stroke()}board.forEach((r,y)=>r.forEach((v,x)=>v&&drawCell(x,y,v)));piece?.m.forEach((r,y)=>r.forEach((v,x)=>v&&drawCell(piece.x+x,piece.y+y,piece.c)));if(!run||over){ctx.fillStyle='rgba(2,6,23,.72)';ctx.fillRect(0,0,c.width,c.height);ctx.fillStyle='#fff';ctx.font='800 22px system-ui';ctx.textAlign='center';ctx.fillText(msg,c.width/2,c.height/2)}}function loop(t){if(run&&!over&&t-last>620-Math.min(420,lines*18)){last=t;soft()}draw();requestAnimationFrame(loop)}function start(){if(over||!board)init();else run=true}leftBtn.onclick=()=>move(-1);rightBtn.onclick=()=>move(1);downBtn.onclick=soft;dropBtn.onclick=hard;rotBtn.onclick=rotate;pauseBtn.onclick=()=>{if(!run&&!over)start();else{run=!run;msg='Pausado'}};c.onpointerdown=start;document.onkeydown=e=>{if(e.key==='ArrowLeft')move(-1);if(e.key==='ArrowRight')move(1);if(e.key==='ArrowDown')soft();if(e.key==='ArrowUp')rotate();if(e.code==='Space')hard()};init();run=false;requestAnimationFrame(loop);
</script></body></html>
